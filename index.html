<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ทะเบียนตัวละคร RPTH</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="shortcut icon" href="./favicon-32x32.png" type="image/x-icon">
  </head>
  <body>
    <main class="page-shell">
      <header class="masthead">
        <div class="rp-logo" aria-hidden="true"></div>
        <div>
          <h1 class="topic">ทะเบียนตัวละคร</h1>
          <p class="masthead-note">รายนามตัวละครและเฟซเคลมในปัจจุบัน</p>
        </div>
      </header>

      <section class="toolbar" aria-label="เครื่องมือค้นหาทะเบียน">
        <div class="toolbar-main">
          <label class="search-box">
            <span>ค้นหา</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="พิมพ์ชื่อตัวละคร ชื่อเฟซเคลม หรือเผ่าพันธุ์ที่ต้องการค้นหา">
          </label>
          <label class="select-box">
            <span>ประเภท</span>
            <select id="typeFilter">
              <option value="all">ทั้งหมด</option>
              <option value="player">ผู้เล่น</option>
              <option value="npc">NPC</option>
              <option value="staff">Staff</option>
            </select>
          </label>
          <button id="refreshButton" class="refresh-button" type="button">รีเฟรช</button>
        </div>
        <div id="letterFilter" class="letter-filter" aria-label="กรองตามตัวอักษรแรก"></div>
        <p class="toolbar-note">แตะหรือชี้ไอคอนนาฬิกา <span class="icon-action usage-button" type="button"></span> เพื่อดูระยะเวลาใช้งานตัวละครหลักในปีปัจจุบัน</p>
        <p class="toolbar-note">ในหน้าจอขนาดเล็ก ปุ่ม <span class="profile-link" title="ลิงก์ประวัติตัวละคร" aria-label="ลิงก์ประวัติตัวละคร"></span> จะพาไปยังหน้าประวัติตัวละคร</p>
        <p class="toolbar-note">ในหน้าจอขนาดเล็ก จุดสีเขียว <span class="tag tag-active" title="กำลังใช้งานอยู่" aria-label="กำลังใช้งานอยู่"></span> แสดงถึงตัวละครที่กำลังใช้งานอยู่</p>
        <div class="toolbar-foot">
          <span id="resultCount">กำลังโหลดข้อมูล...</span>
          <span id="lastUpdated"></span>
        </div>
      </section>

      <article class="paper">
        <div id="registry" class="registry" aria-live="polite"></div>
      </article>
    </main>

    <script src="app.js"></script>
  </body>
</html>
